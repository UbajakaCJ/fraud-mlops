x-airflow-common: &airflow-common
  image: fraud-mlops-airflow:latest
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    MLFLOW_TRACKING_URI: http://mlflow:5000
    FRAUD_MODEL_PATH: /opt/airflow/models
    PYTHONPATH: /opt/airflow
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./app/models:/opt/airflow/models
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
    mongodb:
      condition: service_healthy
  networks:
    - fraud-net

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - fraud-net
  # ─── MongoDB ─────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    command: mongod --quiet 
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: frauddb
    volumes:
      - mongo-db:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      retries: 5
      start_period: 10s
    networks:
      - fraud-net

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    networks:
      - fraud-net

  # ─── MLflow — dedicated mlflowdb database ─────────────────
  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:////mlflow/mlflow.db
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/2.0/mlflow/experiments/search?max_results=1"]
      interval: 10s
      timeout: 8s
      retries: 20
      start_period: 60s
    networks:
      - fraud-net

  # ─── FastAPI Application ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --workers 4 --host 0.0.0.0 --port 8000
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB_NAME: frauddb
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REDIS_URL: redis://redis:6379/0
      MODEL_PATH: /app/model
      SECRET_KEY: "super-secret-key-change-in-prod-32chars"
      ENVIRONMENT: production
      LOG_LEVEL: info
    volumes:
      - ./model:/app/model
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - fraud-net

  # ─── Airflow Init ─────────────────────────────────────────
  # Clears any stale alembic revision then runs fresh migration
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Chijioke --lastname Ubajaka \
          --role Admin --email cubajaka@bluechiptech.biz || true
    restart: on-failure

  # ─── Airflow Webserver ────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver --workers 1
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Airflow Scheduler ────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - fraud-net

volumes:
  mongo-db:
  postgres-db:
  mlflow-artifacts:
  airflow-logs:
  airflow-plugins:

networks:
  fraud-net:
    driver: bridge
