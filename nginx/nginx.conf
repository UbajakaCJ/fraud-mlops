worker_processes auto;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    # ── Connection tuning ────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;

    # ── Upstream: FastAPI (4 uvicorn workers) ────────────────────────────────
    upstream api_backend {
        server api:8000;
        keepalive 64;           # persistent connections to upstream
    }

    # ── Rate limiting ────────────────────────────────────────────────────────
    # 300 req/s per IP — high enough for load tests, still protects production
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=300r/s;
    limit_req_status 429;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log  off;            # disable for load testing (I/O bottleneck)
    error_log   /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        # Allow up to 50MB request bodies (batch payloads)
        client_max_body_size 50M;

        # ── Swagger / docs (no rate limit) ───────────────────────────────────
        location /docs {
            proxy_pass         http://api_backend/docs;
            proxy_set_header   Host $host;
        }

        location /redoc {
            proxy_pass         http://api_backend/redoc;
            proxy_set_header   Host $host;
        }

        location /openapi.json {
            proxy_pass         http://api_backend/openapi.json;
            proxy_set_header   Host $host;
        }

        # ── Health check (no rate limit) ─────────────────────────────────────
        location /health {
            proxy_pass         http://api_backend/health;
            proxy_set_header   Host $host;
        }

        # ── All other routes (rate limited) ──────────────────────────────────
        location / {
            limit_req           zone=api_limit burst=500 nodelay;

            proxy_pass          http://api_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection        "";
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;

            proxy_connect_timeout  10s;
            proxy_read_timeout     60s;
            proxy_send_timeout     60s;

            client_max_body_size   50M;
        }
    }
}
